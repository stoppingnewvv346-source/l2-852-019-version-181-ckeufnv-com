    <h1>SUMMARY: 九十岁的日本遗孤健二从小在中国东北长大,战后未能回国。他的中国养女因病去世,临终前希望他能找到日本的血脉。健二不顾家人反对,骑着一辆改装过的挎斗摩托车,独自踏上跨越日本列岛的寻亲之路。一路上,他遇到排斥他的年轻人、同样在寻找亲人的韩国老奶奶、以及一位帮他翻译旧书信的便利店店员。他逐渐发现,亲生父母早已在空袭中去世,但还有一个弟弟活在广岛。当两人在一座废校见面时,弟弟因为“哥哥抛弃了日本”而拒绝相认。健二没有强求,只是默默留下养女种的一袋种子。一年后,弟弟的孩子找到了他。</h1>
